# General
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=white,bg=green,bold] #S #[bg=default] "
set -g status-right "#[fg=green]#{?client_prefix,PREFIX ,}#[fg=white]#h "
set -g window-status-format "#[fg=white] #I:#W "
set -g window-status-current-format "#[fg=green,bold] #I:#W "
set -g pane-border-style "fg=white"
set -g pane-active-border-style "fg=green"
set -g message-style "bg=default,fg=green"
set -g message-command-style "bg=default,fg=green"
set -g mode-style "bg=green,fg=white"
setw -g clock-mode-colour green
